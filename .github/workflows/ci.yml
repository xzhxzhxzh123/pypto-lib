   name: Self-hosted CI                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                   
   on:                                                                                                                                                                                                                                             
     push:                                                                                                                                                                                                                                         
       branches: [ main, master ]                                                                                                                                                                                                                  
     pull_request:                                                                                                                                                                                                                                 
       branches: [ main, master ]                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                   
   jobs:                                                                                                                                              
     test:                                                                                                                                                                                                                                         
       runs-on: self-hosted                                                                                                                                                                                                   
                                                                                                                                                                                                                                                   
       steps:                                                                                                                                                                                                                                      
       # 步骤 1: 检出代码                                                                                                                                                                                                                          
       - name: Checkout code                                                                                                                                                                                                                       
         uses: actions/checkout@v4                                                                                                                                                                                                                 
         with:                                                                                                                                                                                                                                     
           fetch-depth: 0                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                   
       # 步骤 2: 拉取最新代码到你的服务器目录 ⚠️ 修改这里                                                                                                                                                                                          
       - name: Pull latest code                                                                                                                                                                                                                    
         run: |                                                                                                                                                                                                                                    
           echo "拉取最新代码..."                                                                                                                                                                                                               
           cd /data/x00952168/pypto-lib                                                                                                                                                                            
           git fetch origin                                                                                                                                                                                                                        
           git checkout ${{ github.head_ref }}                                                                                                                                                                                                     
           git pull origin ${{ github.head_ref }}                                                                                                                                                                                                  
           echo "代码拉取完成"                                                                                                                                                                                                                  
                                                                                                                                                                                                                                      
       # 步骤 4: 运行测试 ⚠️ 修改脚本路径                                                                                                                                                                                                          
       - name: Run tests                                                                                                                                                                                                                           
         run: |                                                                                                                                                                                                                                    
           echo "运行测试..."                                                                                                                                                                                                                   
           cd /data/x00952168/pypto-lib
           ./ci_test.py                                                                                                                                                                                                                                                  
